<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Ambient Glow -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Shield Blue/Purple Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="20" flood-color="#312e81" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Glow Background -->
  <circle cx="250" cy="250" r="200" fill="url(#blueGlow)" />

  <!-- Main Floating Glass Panel -->
  <g filter="url(#shadow3d)" transform="translate(250, 240)">
    <!-- Translucent Glass Backing Board -->
    <rect x="-140" y="-140" width="280" height="280" rx="36" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6"/>

    <!-- Glowing 3D Water Drop Shield Icon -->
    <path d="M 0,-80 C 45,-30 70,10 70,50 C 70,88 38,110 0,110 C -38,110 -70,88 -70,50 C -70,10 -45,-30 0,-80 Z" fill="url(#shieldGrad)" />
    
    <!-- Shield Gloss Highlight -->
    <path d="M 0,-65 C 32,-25 50,10 50,45 C 50,55 45,65 35,70 C 20,40 0,0 0,-65 Z" fill="#ffffff" fill-opacity="0.25"/>

    <!-- 3D Lock Symbol Inside Drop -->
    <rect x="-24" y="10" width="48" height="40" rx="8" fill="#ffffff"/>
    <path d="M -14,10 L -14,-6 C -14,-18 14,-18 14,-6 L 14,10" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="28" r="5" fill="#4f46e5"/>
  </g>

  <!-- Small Floating 3D Orbs / Drops -->
  <circle cx="110" cy="140" r="18" fill="url(#shieldGrad)" filter="url(#shadow3d)"/>
  <circle cx="380" cy="340" r="25" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="2" filter="url(#shadow3d)"/>
  <circle cx="390" cy="130" r="12" fill="#3b82f6" opacity="0.8"/>
</svg>
